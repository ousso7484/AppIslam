name: zabi
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

#==== Dependencies start ====#
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  shared_preferences: ^2.2.2
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.0
  intl: ^0.19.0
  http: ^1.1.0
  path: ^1.8.3
  http_parser: ^4.0.2
  hijri: ^3.0.0
  vibration: ^3.1.3
  url_launcher: ^6.1.10
  flutter_launcher_icons: ^0.13.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  sqflite: ^2.3.0
  flutter_timezone: ^4.1.0
  #  prayers_times: ^0.0.6
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  flutter_qiblah: ^3.1.0+1
  razorpay_flutter: ^1.3.7
  flutter_paypal: ^0.2.1
  flutter_stripe: ^11.0.0
  flutter_paystack_plus: ^2.0.4
  shimmer: ^3.0.0
  scrollable_positioned_list: ^0.3.8
  just_audio: ^0.9.39
  audio_service: ^0.18.15
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  wallpaper_setter: ^0.0.4
  path_provider: ^2.1.3

  # just_audio: ^0.9.38
  # path_provider: ^2.1.3

#==== Dev Dependencies start ====#
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  #==== Assets start ====#
  assets:
    - assets/icon/
    - assets/icon/flag/
    - assets/language/
    - assets/audio/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-Regular.ttf
          weight: 400
        - asset: assets/font/Roboto-Medium.ttf
          weight: 500
        - asset: assets/font/Roboto-Bold.ttf
          weight: 700
        - asset: assets/font/Roboto-Black.ttf
          weight: 900
